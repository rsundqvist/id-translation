name: tests

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "info"
  push:
    branches:
      - master
      - ci/*
  pull_request:
    branches:

env:
  POLARS_SKIP_CPU_CHECK: true

jobs:
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11 with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Linting
        run: uv run inv lint

  tests:
    needs: linting
    name: ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        os: [ 'Ubuntu', 'MacOS', 'Windows' ]
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]
        experimental: [ false ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }} with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start Docker databases
        # No Docker for Mac and Windows in CI/CD.
        if: matrix.os == 'Ubuntu'
        shell: bash
        run: ./run-docker-dvdrental.sh

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Run mypy with nox
        shell: bash
        run: uv run nox --force-color -s mypy-${{ matrix.python-version }}

      - name: Run tests with nox
        shell: bash
        run: uv run nox --force-color -s tests-${{ matrix.python-version }}

      - name: Run audit
        if: matrix.python-version == '3.11' && matrix.os == 'Ubuntu'
        shell: bash
        run: uv run nox --force-color -s audit

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ matrix.python-version }}+${{ matrix.os }}
          path: ".coverage.*"
          if-no-files-found: "error"
          include-hidden-files: true

  free-threading:
    needs: linting
    name: Free-threaded / 3.14t
    runs-on: ubuntu-latest
    # Non-blocking: exercises the no-GIL build to surface data races without gating merges. We use
    # step-level continue-on-error (not job-level) so the job stays green and doesn't emit a
    # "job failed" notification; a failing race test is re-surfaced as a warning in the run summary.
    steps:
      - uses: actions/checkout@v6

      - name: Set up free-threaded Python 3.14t with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14t'

      - name: Install nox
        run: uv tool install nox

      - name: Run free-threaded race tests with nox
        id: free_threading
        continue-on-error: true
        run: nox --force-color -s free_threading

      - name: Flag race-test outcome
        if: steps.free_threading.outcome == 'failure'
        run: echo "⚠️ Free-threaded race tests failed (non-gating) — a no-GIL data race surfaced; see the job logs." >> "$GITHUB_STEP_SUMMARY"

  coverage:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14 with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Create coverage report
        shell: bash
        run: uv run nox --force-color --session=coverage -- --fmt xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
